spring.application.name=openlosa-backend
server.address=127.0.0.1

spring.datasource.url=${OPENLOSA_DB_URL:jdbc:mysql://127.0.0.1:3306/openlosa}
spring.datasource.username=${OPENLOSA_DB_USER:openlosa}
spring.datasource.password=${OPENLOSA_DB_PASSWORD:openlosa}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

openlosa.email-finder.url=${OPENLOSA_EMAIL_FINDER_URL:http://127.0.0.1:8091}
openlosa.email-finder.read-timeout=${OPENLOSA_EMAIL_FINDER_READ_TIMEOUT:310s}

openlosa.dashboard.no-update-threshold-days=${OPENLOSA_NO_UPDATE_THRESHOLD_DAYS:14}

openlosa.engine.jobs-file=${OPENLOSA_ENGINE_JOBS_FILE:../engine/export/jobs.json}
openlosa.feed.ingest-interval=${OPENLOSA_FEED_INGEST_INTERVAL:PT1H}
openlosa.feed.ingest-initial-delay=${OPENLOSA_FEED_INGEST_INITIAL_DELAY:PT10S}
openlosa.feed.scheduling-enabled=${OPENLOSA_FEED_SCHEDULING_ENABLED:true}
