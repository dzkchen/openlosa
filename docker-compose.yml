services:
  mysql:
    image: mysql:8.0
    container_name: openlosa-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_DATABASE: openlosa
      MYSQL_USER: openlosa
      MYSQL_PASSWORD: openlosa
      MYSQL_ROOT_PASSWORD: openlosa-root
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    volumes:
      - mysql_data:/var/lib/mysql

  email-finder:
    build:
      context: ./email-finder
      args:
        EMAIL_ME_COMMIT: 8b448def98d0bf88143affc2459f7c7d433dc869
    container_name: openlosa-email-finder
    profiles:
      - email
    restart: unless-stopped
    ports:
      - "127.0.0.1:8091:8091"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  engine:
    build:
      context: ./engine
    container_name: openlosa-engine
    profiles:
      - engine
    restart: unless-stopped
    environment:
      ENGINE_INTERVAL_SECONDS: ${OPENLOSA_ENGINE_INTERVAL_SECONDS:-14400}
    volumes:
      - engine_data:/opt/intern-engine/data

volumes:
  engine_data:
  mysql_data:
